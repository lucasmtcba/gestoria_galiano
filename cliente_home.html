<!DOCTYPE html>
<html lang="es">
<head>

    <title>Home - Cliente</title>
    <style>
        body {

            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            color: #333;
        }
        .header {
            background-color: #1a1a1a;
            color: #d4af37;
            padding: 15px;
            text-align: center;

            font-weight: bold;
        }

        }
        .btn {
            background-color: #d4af37;
            color: white;
            border: none;
            padding: 12px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            margin-bottom: 10px;
        }

    <div class="container">
        <div class="card">
            <h2>Bienvenido, Lucas</h2>
            <p>Selecciona una opción para continuar:</p>

            <div class="section-title">Comunicación</div>
            <button class="btn" onclick="window.location.href='cliente_nueva_consulta.html'">Enviar Nueva Consulta</button>

            <div class="section-title">Recepción Documental</div>
            <button class="btn" onclick="window.location.href='cliente_recepcion_documental.html'">Enviar Documentos Solicitados</button>

            <div class="section-title">Portal Documental</div>
            <button class="btn" onclick="window.location.href='cliente_documentos.html'">Acceder a Mis Documentos</button>

            <div class="section-title">Club de Empresas</div>

    </div>

</html>
