<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestoría Digital Galiano</title>
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #ffffff;
        }
        .header {
            background-color: #1a1a1a;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #d4af37;
        }
        .logo {
            font-size: 36px;
            font-weight: bold;
            color: #d4af37;
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
            flex-direction: column;
        }
        .card {
            background-color: #2a2a2a;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            margin: 20px;
            width: 300px;
        }
        .btn {
            background-color: #d4af37;
            color: #1a1a1a;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin: 10px;
        }
        .btn:hover {
            background-color: #b8952d;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">Gestoría Galiano</div>
    </div>
    <div class="container">
        <div class="card">
            <h2>Selecciona tu rol</h2>
            <button class="btn" onclick="window.location.href='cliente_home.html'">Cliente</button>
            <button class="btn" onclick="window.location.href='gestoria_login.html'">Gestoría</button>
        </div>
    </div>
</body>
</html>
