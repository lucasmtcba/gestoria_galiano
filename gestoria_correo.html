<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Correo - Gestoría</title>
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            color: #333;
        }
        .header {
            background-color: #1a1a1a;
            color: #d4af37;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }
        .container {
            display: flex;
            height: calc(100vh - 60px);
        }
        .sidebar {
            width: 300px;
            background-color: #2a2a2a;
            color: white;
            padding: 20px;
            overflow-y: auto;
        }
        .email-list {
            list-style: none;
            padding: 0;
        }
        .email-item {
            padding: 12px;
            border-bottom: 1px solid #444;
            cursor: pointer;
            border-radius: 5px;
            margin-bottom: 5px;
        }
        .email-item:hover {
            background-color: #3a3a3a;
        }
        .email-item.active {
            background-color: #d4af37;
            color: #1a1a1a;
        }
        .email-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background-color: white;
        }
        .email-header {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .email-actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }
        .btn {
            background-color: #d4af37;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .back-btn {
            background-color: #555;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="header">
        Gestor de Correo - Gestoría Galiano
    </div>
    <div class="container">
        <div class="sidebar">
            <h3>Bandeja de Entrada</h3>
            <ul class="email-list">
                <li class="email-item active" onclick="location.href='#'">
                    <strong>Nueva Factura</strong><br>
                    <small>De: cliente@empresa.com</small>
                </li>
                <li class="email-item" onclick="location.href='#'">
                    <strong>Consulta Laboral</strong><br>
                    <small>De: cliente2@empresa.com</small>
                </li>
            </ul>
        </div>
        <div class="email-area">
            <button class="back-btn" onclick="window.location.href='gestoria_dashboard.html'">Volver al Dashboard</button>
            <div class="email-header">
                Nueva Factura
            </div>
            <p>De: cliente@empresa.com</p>
            <p>Asunto: Envío de factura pendiente</p>
            <p>Adjuntos: factura_pendiente.pdf</p>
            <div class="email-actions">
                <button class="btn" onclick="alert('Convertir a conversación')">Convertir a Conversación</button>
                <button class="btn" onclick="alert('Guardar adjunto en recepción documental')">Guardar Adjunto</button>
            </div>
        </div>
    </div>
</body>
</html>
