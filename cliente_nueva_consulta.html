<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Consulta</title>
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }
        .header {
            background-color: #1a1a1a;
            color: #d4af37;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }
        .container {
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        select, textarea, input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        textarea {
            height: 100px;
        }
        .btn {
            background-color: #d4af37;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        .back-btn {
            background-color: #555;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="header">
        Nueva Consulta
    </div>
    <div class="container">
        <button class="back-btn" onclick="window.location.href='cliente_home.html'">Volver</button>
        <form action="#" method="post">
            <div class="form-group">
                <label for="categoria">Categoría</label>
                <select id="categoria" required>
                    <option value="">Selecciona una categoría</option>
                    <option value="laboral">Laboral</option>
                    <option value="fiscal">Fiscal/Contable</option>
                    <option value="impuestos">Impuestos</option>
                    <option value="facturas">Envío de Facturas</option>
                    <option value="varios">Varios</option>
                </select>
            </div>
            <div class="form-group">
                <label for="mensaje">Mensaje</label>
                <textarea id="mensaje" placeholder="Describe tu consulta..." required></textarea>
            </div>
            <div class="form-group">
                <label for="archivo">Adjuntar Archivo (opcional)</label>
                <input type="file" id="archivo">
            </div>
            <button type="submit" class="btn">Enviar Consulta</button>
        </form>
    </div>
</body>
</html>
