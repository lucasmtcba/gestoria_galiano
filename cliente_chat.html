<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat con Gestoría</title>
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }
        .header {
            background-color: #1a1a1a;
            color: #d4af37;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }
        .chat-container {
            padding: 20px;
            height: 70vh;
            overflow-y: auto;
            background-color: white;
        }
        .message {
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            max-width: 70%;
        }
        .message.sent {
            background: #d4af37;
            color: white;
            margin-left: auto;
            text-align: right;
        }
        .message.received {
            background: #e0e0e0;
            margin-right: auto;
        }
        .input-area {
            position: fixed;
            bottom: 0;
            width: 100%;
            padding: 10px;
            background: white;
            border-top: 1px solid #ddd;
            display: flex;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            background-color: #d4af37;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        Chat con Gestoría
    </div>
    <div class="chat-container">
        <div class="message received">
            <p><strong>Gestoría:</strong> Hola Lucas, ¿en qué puedo ayudarte hoy?</p>
        </div>
        <div class="message sent">
            <p><strong>Tú:</strong> Necesito ayuda con una factura.</p>
        </div>
    </div>
    <div class="input-area">
        <input type="text" placeholder="Escribe un mensaje...">
        <button>Enviar</button>
    </div>
</body>
</html>
