<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recepción Documental</title>
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }
        .header {
            background-color: #1a1a1a;
            color: #d4af37;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }
        .container {
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        select, textarea, input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        textarea {
            height: 100px;
        }
        .btn {
            background-color: #d4af37;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
        }
        .back-btn {
            background-color: #555;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 15px;
        }
        .document-list {
            margin-top: 20px;
        }
        .document-item {
            display: flex;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid #eee;
            background-color: white;
            margin-bottom: 10px;
            border-radius: 5px;
        }
        .document-icon {
            margin-right: 15px;
            color: #d4af37;
        }
        .document-info {
            flex: 1;
        }
        .document-actions {
            display: flex;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        Recepción Documental
    </div>
    <div class="container">
        <button class="back-btn" onclick="window.location.href='cliente_home.html'">Volver</button>
        <form action="#" method="post">
            <div class="form-group">
                <label for="tipo_documento">Tipo de Documento</label>
                <select id="tipo_documento" required>
                    <option value="">Selecciona el tipo de documento</option>
                    <option value="factura">Factura</option>
                    <option value="contrato">Contrato</option>
                    <option value="nomina">Nómina</option>
                    <option value="impuesto">Impuesto</option>
                    <option value="otro">Otro</option>
                </select>
            </div>
            <div class="form-group">
                <label for="mensaje">Mensaje (opcional)</label>
                <textarea id="mensaje" placeholder="Describe brevemente el documento..."></textarea>
            </div>
            <div class="form-group">
                <label for="archivo">Adjuntar Documento</label>
                <input type="file" id="archivo" required>
            </div>
            <button type="submit" class="btn">Enviar Documento</button>
        </form>

        <div class="document-list">
            <h3>Historial de Documentos Enviados</h3>
            <div class="document-item">
                <div class="document-icon">📄</div>
                <div class="document-info">
                    <strong>factura_123.pdf</strong><br>
                    <small>Enviado: 25/03/2026</small>
                </div>
                <div class="document-actions">
                    <button class="btn" onclick="alert('Descargando documento')">Descargar</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
